name: ara_sales_mobile
description: Ara Sales — Flutter rep app (Android + iOS).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1                 # API client
  shared_preferences: ^2.2.3  # JWT/session persistence
  flutter_map: ^6.1.0         # OpenStreetMap tiles (mobile)
  latlong2: ^0.9.1            # LatLng for flutter_map
  geolocator: ^11.0.0         # GPS + mock-location flag
  camera: ^0.10.6             # camera-only capture (no gallery)
  safe_device: ^1.1.4         # mock/fake-GPS + device integrity
  image: ^4.1.7               # burn overlay onto the captured photo
  path_provider: ^2.1.3       # temp dirs for processed photos
  intl: ^0.19.0               # timestamp formatting
  fl_chart: ^0.68.0           # pie + bar charts for the analytics dashboard

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
